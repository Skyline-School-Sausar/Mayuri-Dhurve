<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mayuri Dhurve</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0D47A1, #1976D2);
      color: white;
      text-align: center;
    }

    header {
      padding: 40px;
      background: rgba(0, 0, 0, 0.4);
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      letter-spacing: 2px;
    }

    .tagline {
      font-size: 18px;
      opacity: 0.9;
    }

    .profile {
      margin-top: 30px;
    }

    .profile img {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 5px solid white;
      box-shadow: 0 0 20px rgba(255,255,255,0.5);
    }

    .card {
      margin: 30px auto;
      width: 80%;
      max-width: 700px;
      padding: 20px;
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    h2 {
      margin-bottom: 10px;
    }

    .projects {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .project {
      background: white;
      color: black;
      width: 220px;
      margin: 10px;
      padding: 15px;
      border-radius: 15px;
      transition: transform 0.3s;
    }

    .project:hover {
      transform: scale(1.05);
    }

    .project img {
      width: 100%;
      border-radius: 10px;
    }

    footer {
      margin-top: 30px;
      padding: 15px;
      background: rgba(0,0,0,0.4);
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>Mayuri Dhurve 💙</h1>
  <p class="tagline">Creative Mind | Dancing & Drawing Lover 🎨💃</p>
</header>

<div class="profile">
  <img src="https://via.placeholder.com/150" alt="Profile Photo">
</div>

<div class="card">
  <h2>My Interests</h2>
  <p>I love dancing and expressing creativity through drawing.</p>
</div>

<div class="card">
  <h2>My Projects</h2>

  <div class="projects">
    <div class="project">
      <img src="https://via.placeholder.com/200">
      <h3>VR Headset</h3>
    </div>

    <div class="project">
      <img src="https://via.placeholder.com/200">
      <h3>Wind Propelled Car</h3>
    </div>

    <div class="project">
      <img src="https://via.placeholder.com/200">
      <h3>Neon LED Structure</h3>
    </div>
  </div>
</div>

<footer>
  <p>✨ Created in Summer Camp ✨</p>
</footer>

</body>
</html>
